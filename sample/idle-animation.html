<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rarity Card System - Zenith Glitch Overdrive</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Lilita+One&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: #0a0a0f;
  margin: 0;
  gap: 28px;
  font-family: 'Rajdhani', sans-serif;
  padding: 30px 20px;
}

/* ─── RANK BUTTONS ─── */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  max-width: 640px;
}

.btn {
  padding: 8px 16px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
  overflow: hidden;
}

.btn:hover { transform: translateY(-2px); }
.btn:active { transform: translateY(0); }

.btn-bronze { background: linear-gradient(135deg,#5c3317,#8b5a2b); color:#f5cfa0; box-shadow:0 2px 12px #5c331755; }
.btn-silver { background: linear-gradient(135deg,#2e3340,#6b7a99); color:#d0d8ef; box-shadow:0 2px 12px #6b7a9955; }
.btn-gold { background: linear-gradient(135deg,#7a4e00,#e6a800); color:#fff5c0; box-shadow:0 2px 12px #e6a80055; }
.btn-elite { background: linear-gradient(135deg,#0a1a4a,#1a5fd4); color:#9ac8ff; box-shadow:0 2px 14px #1a5fd455; }
.btn-epic { background: linear-gradient(135deg,#0a2a15,#1a9944); color:#80ffb0; box-shadow:0 2px 14px #1a994455; }
.btn-legend { background: linear-gradient(135deg,#3a001a,#cc1155); color:#ffaac8; box-shadow:0 2px 16px #cc115566; }
.btn-mythic { background: linear-gradient(135deg,#4a2e00,#d4940a); color:#fff0a0; box-shadow:0 4px 20px #d4940a88; }
.btn-zenith { background: linear-gradient(135deg,#0f0f1a,#1f0f2a); color:#c0a0ff; border:1px solid #6030aa; box-shadow:0 4px 20px #6030aa66; }
.btn-god {
  background: linear-gradient(135deg,#ff5f6d,#ffc371 22%,#8cff66 45%,#5be7ff 68%,#9b5cff 100%);
  color: #fff;
  box-shadow: 0 4px 24px rgba(255,95,109,0.35), 0 0 26px rgba(91,231,255,0.28);
}

.btn.active { outline: 2px solid rgba(255,255,255,0.5); outline-offset: 2px; }

/* ─── CARD CONTAINER ─── */
.card-wrap { position: relative; }

.card {
  width: 300px;
  height: 450px;
  position: relative;
  overflow: hidden;
  border-radius: 20px;
  background: url('background.png') center / cover no-repeat;
  transition: border-color 0.5s, box-shadow 0.5s, transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  will-change: transform, filter;
}

/* Rank border colors - semakin tinggi rank semakin tebal */
.bronze  .card { border-radius: 15px; box-shadow: 0 0 15px #8b5a2b55; }
.silver  .card { border-radius: 14px; box-shadow: 0 0 16px #6b7a9955; }
.gold    .card { border-radius: 13px; box-shadow: 0 0 18px #e6a80055; }
.elite   .card { border-radius: 12px; box-shadow: 0 0 20px #1a5fd455; }
.epic    .card { border-radius: 11px; box-shadow: 0 0 22px #1a994455; }
.legend  .card { border-radius: 10px; box-shadow: 0 0 24px #cc115566; }
.mythic  .card { border-radius: 9px; box-shadow: 0 0 26px #d4940aaa; }
.zenith  .card { border-radius: 8px; box-shadow: 0 0 28px #6030aa66; }
.god     .card { border-radius: 7px; box-shadow: 0 0 34px rgba(255,255,255,0.35); }

/* ─── LAYERS ─── */
.layer {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
.back-layer   { background-image: url('back.png');   z-index: 1; }
.middle-layer { background-image: url('middle.png'); z-index: 2; }
.front-layer  { background-image: url('front.png');  z-index: 3; }
.sticker-layer { z-index: 5; background-size: contain; background-repeat: no-repeat; background-position: top left; }

.inner-glow { position: absolute; inset: 0; z-index: 6; pointer-events: none; border-radius: 14px; opacity: 0; transition: opacity 0.4s; }
.shine {
  position: absolute;
  width: 60%;
  height: 200%;
  top: -50%;
  left: -80%;
  transform: rotate(25deg);
  z-index: 8;
  opacity: 0;
  pointer-events: none;
  background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.35) 50%, transparent 100%);
}
.glitch-overlay {
  position: absolute;
  inset: 0;
  z-index: 9;
  pointer-events: none;
  border-radius: 14px;
  opacity: 0;
  mix-blend-mode: overlay;
}

/* ═══════════════════════════════════════════════════════════════════════
   ZENITH - FULL CARD GLITCH (BIDANG CARD + KONTEN) DENGAN INTERVAL ACAK 3-5 DETIK
   Semua layer ikut terpengaruh efek distorsi, RGB split, dan skew transformasi.
   ═══════════════════════════════════════════════════════════════════════ */
.zenith .card {
  box-shadow: 0 0 28px #6030aa66, 0 0 30px #6030aa88, 0 0 70px #302060aa;
  animation: zenithCardIdle 4s infinite ease-in-out;
  transition: all 0.08s linear;
}
.zenith .inner-glow {
  opacity: 1;
  box-shadow: inset 0 0 50px 18px rgba(120,50,200,0.35), inset 0 0 100px 35px rgba(80,0,150,0.18);
  animation: glowPulse 2s infinite ease-in-out;
  border-radius: 6px;
}
.zenith .back-layer {
  animation: drift1 5s infinite ease-in-out;
}
.zenith .middle-layer {
  animation: drift2 3.5s infinite ease-in-out;
}
.zenith .front-layer {
  animation: drift3 4s infinite ease-in-out;
}
.zenith .shine {
  display: none;
}
.zenith .back-layer,
.zenith .middle-layer,
.zenith .front-layer,
.zenith .sticker-layer,
.zenith .inner-glow,
.zenith .shine {
  /* base transisi halus untuk glitch */
  transition: transform 0.05s linear, filter 0.05s linear, opacity 0.05s linear;
}
.zenith .sticker-layer {
  background-image: url('rank/zenith.png');
  /* base animation minor, namun glitch akan overriding via JS/class tambahan */
  animation: zenithStickerSoftPulse 3s infinite;
}
.zenith .glitch-overlay {
  border-radius: 6px;
}
/* glitch-active class ditambahkan oleh interval random, memicu glitch ekstrem pada seluruh card + isi */
.zenith.glitch-active .card {
  animation: none;
  transform: scale(1.02) skew(2deg, 1deg);
  filter: contrast(1.5) brightness(1.2) hue-rotate(15deg);
  box-shadow: 0 0 45px #ff44ff, 0 0 90px #aa22ff;
  border-color: #ff66ff;
}
.zenith.glitch-active .back-layer,
.zenith.glitch-active .middle-layer,
.zenith.glitch-active .front-layer,
.zenith.glitch-active .sticker-layer,
.zenith.glitch-active .inner-glow {
  animation: none !important;
  filter: url(#glitchFilter) !important; /* fallback CSS filter jika ada support, plus tambahan rgb split via js dynamic style */
  transform: scale(1.01) skewX(0.8deg) !important;
}
.zenith.glitch-active .sticker-layer {
  filter: hue-rotate(45deg) brightness(1.6) drop-shadow(0 0 6px magenta) !important;
  transform: scale(1.02) skewY(-1deg) !important;
}
.zenith.glitch-active .shine {
  opacity: 0.9 !important;
  left: -30% !important;
  transition: none;
  animation: glitchShineFlash 0.08s 3 alternate;
}
/* Overlay glitch tambahan untuk efek scanline dan RGB */
.zenith.glitch-active .glitch-overlay {
  opacity: 1 !important;
  background: repeating-linear-gradient(0deg, rgba(255,0,255,0.2) 0px, rgba(0,255,255,0.2) 2px, transparent 4px, transparent 8px);
  mix-blend-mode: overlay;
  animation: glitchFlicker 0.06s infinite steps(3);
}
/* Animasi cepat untuk shine saat glitch */
@keyframes glitchShineFlash {
  0% { opacity: 0; scaleX: (0.3); }
  30% { opacity: 1; scaleX: (1); }
  70% { opacity: 1; scaleX: (1.3); }
  100% { opacity: 0; scaleX: (1.2); }
}
@keyframes glitchFlicker {
  0% { opacity: 0.5; background-position: 0 0; filter: brightness(1.2); }
  50% { opacity: 1; background-position: 0 3px; filter: brightness(1.8); }
  100% { opacity: 0.6; background-position: 0 6px; filter: brightness(1.3); }
}
/* efek soft pulse untuk sticker dasar */
@keyframes zenithStickerSoftPulse {
  0% { filter: drop-shadow(0 0 2px #a066ff); opacity: 0.9; }
  100% { filter: drop-shadow(0 0 6px #c080ff); opacity: 1; }
}
@keyframes zenithCardIdle {
  0% { transform: scale(1); }
  50% { transform: scale(1.01); }
  100% { transform: scale(1); }
}
/* Glitch class juga akan menambahkan pseudo-element untuk noise yang lebih dramatis */
.zenith.glitch-active .card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(90deg, rgba(255,0,255,0.15), rgba(0,255,255,0.15) 1px, transparent 2px, transparent 4px);
  z-index: 15;
  pointer-events: none;
  mix-blend-mode: screen;
  animation: scanGlitch 0.04s infinite;
}
@keyframes scanGlitch {
  0% { scaleX: (0.90); opacity: 0.3; }
  50% { scaleX: (1.1); opacity: 0.9; }
  100% { scaleX: (0.95); opacity: 0.5; }
}
/* Agar card tetap memiliki border-radius yang konsisten */
.zenith.glitch-active .card {
  border-radius: 8px;
  overflow: hidden;
}
/* ========== RANK LAIN TETAP DENGAN ANIMASI ORIGINAL (TIDAK TERGANGGU) ========== */
.bronze .card { box-shadow: 0 0 15px #8b5a2b55, 0 4px 18px #5c331733; }
.bronze .middle-layer { animation: drift2 8s infinite ease-in-out; }
.bronze .front-layer { animation: drift3 10s infinite ease-in-out; }
.bronze .sticker-layer { background-image: url(rank/bronze.png); animation: glowSticker 5s infinite ease-in-out; }
.bronze .inner-glow { border-radius: 15px; }
.bronze .glitch-overlay { border-radius: 15px; }

.silver .card { box-shadow: 0 0 16px #6b7a9955, 0 4px 18px #6b7a9933; }
.silver .middle-layer { animation: drift2 6s infinite ease-in-out; }
.silver .front-layer { animation: drift3 7s infinite ease-in-out; }
.silver .sticker-layer { background-image: url(rank/silver.png); animation: glowSticker 4s infinite ease-in-out; }
.silver .inner-glow { border-radius: 14px; }
.silver .glitch-overlay { border-radius: 14px; }

.gold .card { box-shadow: 0 0 18px #e6a80055, 0 6px 24px #e6a80044; }
.gold .middle-layer { animation: drift2 4s infinite ease-in-out; }
.gold .front-layer { animation: drift3 5s infinite ease-in-out; }
.gold .sticker-layer { background-image: url(rank/gold.png); animation: goldStickerPulse 3s infinite ease-in-out; }
.gold .inner-glow { border-radius: 13px; }
.gold .glitch-overlay { border-radius: 13px; }

.elite .card { box-shadow: 0 0 20px #1a5fd455, 0 0 28px #1a5fd488,0 0 60px #0a3a9933; }
.elite .back-layer { animation: drift1 5s infinite ease-in-out; }
.elite .middle-layer { animation: drift2 3.5s infinite ease-in-out; }
.elite .front-layer { animation: drift3 4s infinite ease-in-out; }
.elite .sticker-layer { background-image: url(rank/elite.png); animation: elitePulse 2.5s infinite ease-in-out; }
.elite .inner-glow { border-radius: 12px; }
.elite .glitch-overlay { border-radius: 12px; }

.epic .card { box-shadow: 0 0 22px #1a994455, 0 0 35px #1a994466,0 0 80px #0d6630aa; }
.epic .inner-glow { opacity: 1; box-shadow: inset 0 0 45px 15px rgba(20,200,80,0.35),inset 0 0 90px 25px rgba(10,120,40,0.18); animation: glowPulse 2.5s infinite ease-in-out; border-radius: 10px; }
.epic .back-layer { animation: drift1 4s infinite ease-in-out; }
.epic .middle-layer { animation: drift2 2.5s infinite ease-in-out; }
.epic .front-layer { animation: drift3 3s infinite ease-in-out; }
.epic .sticker-layer { background-image: url(rank/epic.png); animation: epicStickerPulse 2s infinite ease-in-out; }
.epic .glitch-overlay { border-radius: 10px; }

.legend .card { box-shadow: 0 0 24px #cc115566, 0 0 40px #cc115566,0 0 90px #880033aa; animation: cardPulse 2s infinite ease-in-out; }
.legend .inner-glow { opacity: 1; box-shadow: inset 0 0 55px 18px rgba(220,20,80,0.45),inset 0 0 110px 40px rgba(160,0,40,0.22); animation: glowPulse 1.5s infinite ease-in-out; border-radius: 10px; }
.legend .back-layer { animation: drift1 3s infinite ease-in-out; }
.legend .middle-layer { animation: drift2 2s infinite ease-in-out; }
.legend .front-layer { animation: drift3 1.5s infinite ease-in-out; }
.legend .sticker-layer { background-image: url(rank/legend.png); animation: legendStickerPulse 1.5s infinite ease-in-out; }
.legend .shine { animation: shinePeriodic 5s infinite linear; }
.legend .glitch-overlay { border-radius: 10px; }

.mythic .card { box-shadow: 0 0 26px #d4940aaa, 0 0 50px #d4940aaa,0 0 110px #a06a0066,0 0 180px #7a4e0044; animation: cardDramatic 1.5s infinite ease-in-out; }
.mythic .inner-glow { opacity: 1; box-shadow: inset 0 0 60px 22px rgba(230,180,10,0.5),inset 0 0 130px 50px rgba(180,120,0,0.28); animation: glowPulse 1s infinite ease-in-out; border-radius: 9px; }
.mythic .back-layer { animation: drift1 2s infinite ease-in-out; }
.mythic .middle-layer { animation: drift2 1.5s infinite ease-in-out; }
.mythic .front-layer { animation: drift3 1.2s infinite ease-in-out; }
.mythic .sticker-layer { background-image: url(rank/mythic.png); animation: mythicStickerFlare 1s infinite ease-in-out; }
.mythic .shine { animation: shinePeriodic3 3s infinite linear; }
.mythic .glitch-overlay { border-radius: 9px; }

.god .card {
  box-shadow:
    0 0 32px rgba(255,255,255,0.30),
    0 0 58px rgba(255,120,120,0.32),
    0 0 90px rgba(91,231,255,0.26),
    0 0 160px rgba(155,92,255,0.20);
  animation: godCardAscend 1s infinite ease-in-out;
}
.god .inner-glow {
  opacity: 1;
  box-shadow:
    inset 0 0 70px 26px rgba(255,255,255,0.18),
    inset 0 0 120px 40px rgba(255,196,113,0.24),
    inset 0 0 160px 56px rgba(91,231,255,0.18);
  animation: godGlowPrism 0.8s infinite ease-in-out;
  border-radius: 7px;
}
.god .back-layer { animation: godDriftBack 1.5s infinite ease-in-out; }
.god .middle-layer { animation: godDriftMiddle 1s infinite ease-in-out; }
.god .front-layer { animation: godDriftFront 0.8s infinite ease-in-out; }
.god .sticker-layer {
  background-image: url(rank/god.png);
  animation: godStickerHalo 0.75s infinite ease-in-out;
}
.god .shine {
  opacity: 1;
  animation: godShineSweep 1.6s infinite linear;
  background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.22) 28%, rgba(255,255,255,0.9) 50%, rgba(255,255,255,0.24) 72%, transparent 100%);
}
.god .glitch-overlay {
  opacity: 0.4;
  border-radius: 7px;
  background: linear-gradient(135deg, rgba(255,95,109,0.14), rgba(255,195,113,0.12), rgba(91,231,255,0.12), rgba(155,92,255,0.14));
  mix-blend-mode: screen;
  animation: godOverlayShift 2.2s infinite linear;
}

/* semua keyframes umum - stretch-like effect tanpa translate */
@keyframes drift1 { 0%{transform:scale(1) skewY(0deg);} 50%{transform:scale(1.03) skewY(-1.2deg);} 100%{transform:scale(1) skewY(0deg);} }
@keyframes drift2 { 0%{transform:scale(1) skewX(0deg);} 50%{transform:scale(1.04) skewX(1.5deg);} 100%{transform:scale(1) skewX(0deg);} }
@keyframes drift3 { 0%{transform:scale(1) scaleY(1);} 50%{transform:scale(1.02) scaleY(1.05);} 100%{transform:scale(1) scaleY(1);} }
@keyframes wavy { 0%{transform:scale(1) skewX(0deg) skewY(0deg);} 25%{transform:scale(1.02) skewX(0.5deg) skewY(-0.8deg);} 50%{transform:scale(1.04) skewX(-0.8deg) skewY(0.6deg);} 75%{transform:scale(1.02) skewX(0.3deg) skewY(-0.4deg);} 100%{transform:scale(1) skewX(0deg) skewY(0deg);} }
@keyframes glowPulse { 0%{opacity:0.65;} 50%{opacity:1;} 100%{opacity:0.65;} }
@keyframes glowSticker { 0%{opacity:0.8;} 50%{opacity:1;} 100%{opacity:0.8;} }
@keyframes goldStickerPulse { 0%{filter:brightness(1) drop-shadow(0 0 4px #e6a80088);} 50%{filter:brightness(1.3) drop-shadow(0 0 12px #ffe066cc);} 100%{filter:brightness(1) drop-shadow(0 0 4px #e6a80088);} }
@keyframes elitePulse { 0%{filter:brightness(1) drop-shadow(0 0 5px #1a5fd488);} 50%{filter:brightness(1.2) drop-shadow(0 0 16px #5599ffcc);} 100%{filter:brightness(1) drop-shadow(0 0 5px #1a5fd488);} }
@keyframes epicStickerPulse { 0%{filter:brightness(1) drop-shadow(0 0 6px #1a994466);} 50%{filter:brightness(1.25) drop-shadow(0 0 18px #44ff88cc);} 100%{filter:brightness(1) drop-shadow(0 0 6px #1a994466);} }
@keyframes legendStickerPulse { 0%{filter:brightness(1) drop-shadow(0 0 8px #cc115566);} 50%{filter:brightness(1.3) drop-shadow(0 0 22px #ff44aacc);} 100%{filter:brightness(1) drop-shadow(0 0 8px #cc115566);} }
@keyframes mythicStickerFlare { 0%{filter:brightness(1.1) drop-shadow(0 0 10px #d4940aaa);} 50%{filter:brightness(1.5) drop-shadow(0 0 28px #ffe566ff) saturate(1.4);} 100%{filter:brightness(1.1) drop-shadow(0 0 10px #d4940aaa);} }
@keyframes cardPulse { 0%{transform:scale(1) rotate(0deg);} 50%{transform:scale(1.015) rotate(0.3deg);} 100%{transform:scale(1) rotate(0deg);} }
@keyframes cardDramatic { 0%{transform:scale(1) rotate(0deg);} 25%{transform:scale(1.03) rotate(0.6deg);} 50%{transform:scale(1.04) rotate(-0.4deg);} 75%{transform:scale(1.02) rotate(0.3deg);} 100%{transform:scale(1) rotate(0deg);} }
@keyframes shinePeriodic { 0%,55%{left:-80%;opacity:0;} 56%{opacity:1;} 80%{left:140%;opacity:0;} 100%{left:140%;opacity:0;} }
@keyframes shinePeriodic3 { 0%,40%{left:-80%;opacity:0;} 41%{opacity:1;} 70%{left:140%;opacity:0;} 100%{left:140%;opacity:0;} }
@keyframes godCardAscend {
  0% { transform: scale(1) scaleY(1) scaleX(1) rotate(0deg); }
  20% { transform: scale(1.015) scaleY(1.025) scaleX(0.995) rotate(0.25deg); }
  45% { transform: scale(1.03) scaleY(1.045) scaleX(0.985) rotate(-0.35deg); }
  70% { transform: scale(1.018) scaleY(0.99) scaleX(1.02) rotate(0.2deg); }
  100% { transform: scale(1) scaleY(1) scaleX(1) rotate(0deg); }
}
@keyframes godGlowPrism {
  0% { opacity: 0.72; filter: saturate(1.1) hue-rotate(0deg); }
  50% { opacity: 1; filter: saturate(1.45) hue-rotate(28deg); }
  100% { opacity: 0.78; filter: saturate(1.15) hue-rotate(0deg); }
}
@keyframes godStickerHalo {
  0% { filter: brightness(1.15) saturate(1.2) drop-shadow(0 0 12px rgba(255,255,255,0.45)); }
  50% { filter: brightness(1.6) saturate(1.55) hue-rotate(26deg) drop-shadow(0 0 30px rgba(255,255,255,0.72)); }
  100% { filter: brightness(1.15) saturate(1.2) drop-shadow(0 0 12px rgba(255,255,255,0.45)); }
}
@keyframes godDriftBack {
  0% { transform: scale(1) skewY(0deg) scaleX(1); }
  50% { transform: scale(1.03) skewY(-1.1deg) scaleX(0.99); }
  100% { transform: scale(1) skewY(0deg) scaleX(1); }
}
@keyframes godDriftMiddle {
  0% { transform: scale(1) skewX(0deg) scaleY(1); }
  50% { transform: scale(1.04) skewX(1.6deg) scaleY(1.03); }
  100% { transform: scale(1) skewX(0deg) scaleY(1); }
}
@keyframes godDriftFront {
  0% { transform: scale(1) scaleY(1) skewX(0deg); }
  50% { transform: scale(1.05) scaleY(1.05) skewX(-1.2deg); }
  100% { transform: scale(1) scaleY(1) skewX(0deg); }
}
@keyframes godShineSweep {
  0% { left: -95%; opacity: 0; }
  10% { opacity: 1; }
  55% { left: 125%; opacity: 0.95; }
  100% { left: 125%; opacity: 0; }
}
@keyframes godOverlayShift {
  0% { filter: hue-rotate(0deg) saturate(1.1); }
  50% { filter: hue-rotate(45deg) saturate(1.45); }
  100% { filter: hue-rotate(0deg) saturate(1.1); }
}

</style>
</head>
<body>

<div class="controls">
  <button class="btn btn-bronze active" onclick="setRank('bronze',this)">Bronze</button>
  <button class="btn btn-silver" onclick="setRank('silver',this)">Silver</button>
  <button class="btn btn-gold" onclick="setRank('gold',this)">Gold</button>
  <button class="btn btn-elite" onclick="setRank('elite',this)">Elite</button>
  <button class="btn btn-epic" onclick="setRank('epic',this)">Epic</button>
  <button class="btn btn-legend" onclick="setRank('legend',this)">Legend</button>
  <button class="btn btn-mythic" onclick="setRank('mythic',this)">Mythic</button>
  <button class="btn btn-zenith" onclick="setRank('zenith',this)">Zenith</button>
  <button class="btn btn-god" onclick="setRank('god',this)">God</button>
</div>

<div class="card-wrap bronze" id="wrap">
  <div class="card" id="card">
    <div class="layer back-layer"></div>
    <div class="layer middle-layer"></div>
    <div class="layer front-layer"></div>
    <div class="layer sticker-layer"></div>
    <div class="inner-glow"></div>
    <div class="shine"></div>
    <div class="glitch-overlay"></div>
  </div>
</div>

<script>
  // Global variable untuk menyimpan interval glitch Zenith
  let zenithGlitchInterval = null;
  let currentRank = 'bronze';
  let glitchActive = false;

  // Fungsi untuk menghentikan interval glitch jika ada
  function stopZenithGlitch() {
    if (zenithGlitchInterval) {
      clearInterval(zenithGlitchInterval);
      zenithGlitchInterval = null;
    }
    // hapus class glitch-active dari wrap jika masih ada
    const wrap = document.getElementById('wrap');
    if (wrap.classList.contains('glitch-active')) {
      wrap.classList.remove('glitch-active');
    }
    // reset inline style yang mungkin tertinggal pada card / layer saat glitch dipaksa
    const card = document.getElementById('card');
    if (card) {
      card.style.transform = '';
      card.style.filter = '';
    }
    // reset semua layer inline style secara massal
    const layers = document.querySelectorAll('#card .layer, #card .inner-glow, #card .shine');
    layers.forEach(layer => {
      layer.style.transform = '';
      layer.style.filter = '';
    });
    glitchActive = false;
  }

  // Fungsi menjalankan efek glitch penuh pada bidang card dan seluruh konten (Zenith only)
  // Efek acak dengan durasi lebih pendek untuk trigger cepat dan intensitas tinggi.
  function triggerZenithFullGlitch() {
    const wrap = document.getElementById('wrap');
    // Pastikan rank yang aktif adalah zenith
    if (currentRank !== 'zenith') return;
    if (glitchActive) return;
    
    // Tambahkan class glitch-active
    wrap.classList.add('glitch-active');
    glitchActive = true;
    
    // Durasi glitch lebih pendek: 80ms - 200ms untuk kesan cepat dan "glitchy"
    const glitchDuration = Math.floor(Math.random() * (200 - 80 + 1) + 80);
    
    // Variasi efek tambahan dengan mengubah parameter CSS secara inline untuk membuat glitch lebih intensif
    const cardElem = document.getElementById('card');
    if (currentRank === 'zenith') {
      // Tingkatkan intensitas: skew lebih besar, scale lebih ekstrem
      const randomSkewX = (Math.random() * 12 - 6).toFixed(1);
      const randomSkewY = (Math.random() * 8 - 4).toFixed(1);
      const randomScale = (Math.random() * 0.2 + 0.95).toFixed(2);
      const hueRotate = Math.floor(Math.random() * 360);
      cardElem.style.transform = `skew(${randomSkewX}deg, ${randomSkewY}deg) scale(${randomScale})`;
      cardElem.style.filter = `contrast(1.6) brightness(1.35) hue-rotate(${hueRotate}deg) saturate(1.3)`;
      
      // layer sticker dan back dengan efek lebih dramatis
      const sticker = document.querySelector('.zenith .sticker-layer');
      if (sticker) {
        sticker.style.transform = `scale(${(Math.random() * 0.25 + 0.90).toFixed(2)}) skewX(${(Math.random() * 8 - 4).toFixed(1)}deg) skewY(${(Math.random() * 6 - 3).toFixed(1)}deg)`;
        sticker.style.filter = `hue-rotate(${Math.random() * 120 - 60}deg) saturate(2.5) brightness(${(Math.random() * 0.5 + 1.2).toFixed(2)})`;
      }
      const backLayer = document.querySelector('.zenith .back-layer');
      if (backLayer) backLayer.style.transform = `scale(${(Math.random() * 0.15 + 0.96).toFixed(2)}) skewY(${(Math.random() * 6 - 3).toFixed(1)}deg) scaleX(${(Math.random() * 0.2 + 0.95).toFixed(2)})`;
      const middleLayer = document.querySelector('.zenith .middle-layer');
      if (middleLayer) middleLayer.style.transform = `scale(${(Math.random() * 0.2 + 0.95).toFixed(2)}) scaleX(${(Math.random() * 0.15 + 0.93).toFixed(2)}) skewX(${(Math.random() * 5 - 2.5).toFixed(1)}deg)`;
      const frontLayer = document.querySelector('.zenith .front-layer');
      if (frontLayer) frontLayer.style.transform = `scale(${(Math.random() * 0.15 + 0.96).toFixed(2)}) skewX(${(Math.random() * 6 - 3).toFixed(1)}deg) skewY(${(Math.random() * 4 - 2).toFixed(1)}deg)`;
    }
    
    // Set timeout untuk menghapus efek glitch setelah durasi
    setTimeout(() => {
      if (currentRank === 'zenith') {
        wrap.classList.remove('glitch-active');
        // Reset inline style yang ditambahkan
        const cardElemReset = document.getElementById('card');
        if (cardElemReset) {
          cardElemReset.style.transform = '';
          cardElemReset.style.filter = '';
        }
        const stickerReset = document.querySelector('.zenith .sticker-layer');
        if (stickerReset) {
          stickerReset.style.transform = '';
          stickerReset.style.filter = '';
        }
        const backReset = document.querySelector('.zenith .back-layer');
        if (backReset) backReset.style.transform = '';
        const middleReset = document.querySelector('.zenith .middle-layer');
        if (middleReset) middleReset.style.transform = '';
        const frontReset = document.querySelector('.zenith .front-layer');
        if (frontReset) frontReset.style.transform = '';
        glitchActive = false;
      } else {
        glitchActive = false;
      }
    }, glitchDuration);
  }
  
  // Membuat interval untuk zenith: glitch setiap 3 detik dengan multiple mini-glitch
  function startRandomZenithGlitch() {
    if (zenithGlitchInterval) stopZenithGlitch();
    if (currentRank !== 'zenith') return;
    
    const scheduleNext = () => {
      if (currentRank !== 'zenith') {
        if (zenithGlitchInterval) clearTimeout(zenithGlitchInterval);
        zenithGlitchInterval = null;
        return;
      }
      // Fixed interval: setiap 3000ms (3 detik)
      zenithGlitchInterval = setTimeout(() => {
        if (currentRank === 'zenith') {
          // Trigger multiple mini-glitch dalam satu interval untuk efek lebih glitchy
          triggerZenithFullGlitch();
          // Mini-glitch kedua 200ms kemudian
          setTimeout(() => {
            if (currentRank === 'zenith' && !glitchActive) {
              triggerZenithFullGlitch();
            }
          }, 200);
          // Mini-glitch ketiga 400ms kemudian
          setTimeout(() => {
            if (currentRank === 'zenith' && !glitchActive) {
              triggerZenithFullGlitch();
            }
          }, 400);
          scheduleNext();
        } else {
          if (zenithGlitchInterval) clearTimeout(zenithGlitchInterval);
          zenithGlitchInterval = null;
        }
      }, 3000);
    };
    scheduleNext();
  }
  
  // Set rank function (update dari tombol)
  function setRank(rank, btn) {
    // stop glitch lama jika zenith sebelumnya
    if (currentRank === 'zenith') {
      stopZenithGlitch();
    }
    const wrap = document.getElementById('wrap');
    wrap.className = 'card-wrap ' + rank;
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRank = rank;
    
    // Reset inline style apa pun pada card untuk menghindari leftover
    const cardElem = document.getElementById('card');
    if (cardElem) {
      cardElem.style.transform = '';
      cardElem.style.filter = '';
    }
    const allLayers = document.querySelectorAll('#card .layer, #card .inner-glow, #card .shine');
    allLayers.forEach(l => {
      l.style.transform = '';
      l.style.filter = '';
    });
    
    // Jika rank baru adalah zenith, mulai interval glitch acak
    if (rank === 'zenith') {
      startRandomZenithGlitch();
    } else {
      // pastikan tidak ada sisa class glitch
      if (wrap.classList.contains('glitch-active')) wrap.classList.remove('glitch-active');
      if (zenithGlitchInterval) {
        clearTimeout(zenithGlitchInterval);
        zenithGlitchInterval = null;
      }
    }
  }
  
  // Attach ke window agar tombol bisa akses
  window.setRank = setRank;
  
  // Inisialisasi: jika user langsung klik zenith? tidak, awal bronze. Tapi untuk menjaga konsistensi
  // bila suatu saat tombol zenith dipanggil, fungsi setRank akan menangani.
  // Menambahkan manual reset untuk keamanan jika halaman dimuat dengan bronze.
  window.addEventListener('load', () => {
    // Pastikan tidak ada glitch aktif
    const wrapInit = document.getElementById('wrap');
    if (wrapInit.classList.contains('glitch-active')) wrapInit.classList.remove('glitch-active');
    currentRank = 'bronze';
  });
</script>
</body>
</html>
