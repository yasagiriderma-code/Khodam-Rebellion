<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title>Khodam Rebellion</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="intro">
            <h1>KHODAM <br> REBELLION</h1>
        </div>

        <div class="early-caching">
            <div>
                <h1>MENGUNDUH KONTEN</h1>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <h1><span id="progress-text">0</span>%</h1>
            </div>
        </div>

        <div class="main-lobby">
            <div class="main-lobby-title-overlay">
                <h1 id="nama-khodam">WIRO SABLENG</h1>
            </div>
            <video autoplay muted loop playsinline id="background-video-main-lobby">
                <source src="animation/wirosableng/wirosableng.webm" type="video/webm">
                <source src="animation/wirosableng/wirosableng.mp4" type="video/mp4">
                Error: Tidak bisa lihat animasi Khodam.
            </video>
            <div class="input-name-overlay">
                <input type="text" id="player-name-input" placeholder="Ketik Nama Kamu . . .">
            </div>
            <div class="main-lobby-tombol-overlay">
                <button id="khodam-selection-button">👻🔄</button>
                <button id="play-button">BERTARUNG ▶</button>
            </div>
        </div>

        <div class="khodam-selection">
            <div class="khodam-selection-title-overlay">
                <h1>Pilih Khodam</h1>
            </div>
            <div class="khodam-selection-cards" id="khodam-selection-cards"></div>
            <div class="khodam-selection-button-overlay">
                <button class="khodam-option-button batalpilih-button" id="cancel-khodam-selection"><span>❌</span><br> BATAL</button>
                <button class="khodam-option-button pilih-button" id="confirm-khodam-selection"><span>✔️</span><br> PILIH</button>
            </div>
        </div>

        <div class="cari-lawan">
            <h2>Mencari Lawan</h2>
            <h1>⌛</h1>
        </div>

        <div class="gameplay">
            <div class="battle-toast" id="battle-toast">PERTARUNGAN DIMULAI</div>
            <div class="battle-float-layer" id="battle-float-layer">
                <div class="damage-float battle-float player-float" id="player-damage-float">-100</div>
                <div class="damage-float battle-float opponent-float" id="opponent-damage-float">-100</div>
            </div>
            <div class="player combatant">
                <div class="status-card-player status-card">
                    <p class="label" id="nama-player">KAMU</p>
                    <h2 class="name" id="player-battle-name">SABLENG</h2>
                    <div class="hp-track">
                        <div class="hp-trail-fill" id="player-hp-trail-fill" style="width: 100%;"></div>
                        <div class="hp-fill" id="player-hp-fill" style="width: 100%;"></div>
                        <div class="armor-fill" id="player-armor-fill" style="width: 0%; left: 100%;"></div>
                    </div>
                    <p class="status-meta" id="player-status-meta">1000 / 1000 HP</p>
                </div>
                <div class="card-player battle-card">
                    <video class="card-art" id="player-card-art" autoplay muted loop playsinline>
                        <source src="animation/wirosableng/wirosableng.webm" type="video/webm">
                        <source src="animation/wirosableng/wirosableng.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
            <div class="opponent combatant">
                <div class="status-card-opponent status-card">
                    <p class="label" id="nama-opponent">MUSUH</p>
                    <h2 class="name" id="opponent-battle-name">PITUNG</h2>
                    <div class="hp-track">
                        <div class="hp-trail-fill enemy-trail-fill" id="opponent-hp-trail-fill" style="width: 100%;"></div>
                        <div class="hp-fill enemy-fill" id="opponent-hp-fill" style="width: 100%;"></div>
                        <div class="armor-fill enemy-armor-fill" id="opponent-armor-fill" style="width: 0%; left: 100%;"></div>
                    </div>
                    <p class="status-meta" id="opponent-status-meta">1000 / 1000 HP</p>
                </div>
                <div class="card-opponent battle-card">
                    <video class="card-art" id="opponent-card-art" autoplay muted loop playsinline>
                        <source src="animation/sipitung/sipitung.webm" type="video/webm">
                        <source src="animation/sipitung/sipitung.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </div>

        <div class="surrender-overlay">
            <button class="surrender-button" id="surrender-button">🏳️</button>
        </div>
        <div class="action-menu-overlay">
            <button class="action-button" data-action="attack" title="Attack">🗡️</button>
            <button class="action-button" data-action="skill" title="Skill">⚔️</button>
            <button class="action-button" data-action="ultimate" title="Ultimate">💥</button>
            <button class="action-button" data-action="shield" title="Shield">🛡️</button>
        </div>

        <div class="fullscreen-animation-in-game">
            <video class="animasi-fullscreen-video" playsinline>
                <source src="animation/wirosableng/wirosableng.webm" type="video/webm">
                <source src="animation/wirosableng/wirosableng.mp4" type="video/mp4">
            </video>
        </div>
        <div class="skip-animation-overlay">
            <button class="skip-animation-button">SKIP ⏭</button>
        </div>
        <div class="kata2-hero-overlay">
            <p id="kata2-hero"></p>
        </div>

        <div class="modal-overlay" id="confirm-modal">
            <div class="modal-card">
                <h1 id="modal-title">SURRENDER?</h1>
                <p id="modal-description">Kalau menyerah, pertarungan dianggap kalah.</p>
                <div class="modal-actions">
                    <button class="modal-button danger" id="modal-confirm">YA</button>
                    <button class="modal-button" id="modal-cancel">TIDAK</button>
                </div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
