<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Khodam Rebellion</title> 
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- Title Intro Page -->
        <div class="intro">
            <h1>KHODAM <br> REBELLION</h1>
        </div>

        <!-- Unduh Konten Page -->
        <div class="early-caching">
            <div>
                <h1>MENGUNDUH KONTEN</h1>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <h1><span id="progress-text">0</span>%</h1>
            </div>
        </div>

        <!-- Main Lobby -->
        <div class="main-lobby">
            <div class="main-lobby-title-overlay">
                <h1 id="nama-khodam">WIRO SABLENG</h1>
            </div>
            <video autoplay muted loop id="background-video-main-lobby">
                <source src="wirosableng.mp4" type="video/mp4">
                Error: Tidak bisa lihat animasi Khodam.
            </video>
            <div class="input-name-overlay">
                <input type="text" id="player-name-input" placeholder="Ketik Nama Kamu . . .">
            </div>
            <div class="main-lobby-tombol-overlay">
                <button id="khodam-selection-button">👻🔄</button>
                <button id="play-button">BERTARUNG ▶</button>
            </div>
        </div>

        <!-- Khodam Selection Page -->
        <div class="khodam-selection">
            <div class="khodam-selection-title-overlay">
                <h1>Pilih Khodam</h1>
            </div>
            <div class="khodam-selection-cards">
                <div class="khodam-card">
                    <img src="wirosableng.png" alt="Wiro Sableng">
                    <h2>WIRO SABLENG</h2>
                </div>
                <div class="khodam-card">
                    <img src="sipitung.png" alt="Si Pitung">
                    <h2>SI PITUNG</h2>
                </div>
                <div class="khodam-card">
                    <img src="wirosableng.png" alt="Wiro Sableng">
                    <h2>WIRO SABLENG</h2>
                </div>
                <div class="khodam-card">
                    <img src="wirosableng.png" alt="Wiro Sableng">
                    <h2>WIRO SABLENG</h2>
                </div>
                <div class="khodam-card">
                    <img src="wirosableng.png" alt="Wiro Sableng">
                    <h2>WIRO SABLENG</h2>
                </div>
                <div class="khodam-card">
                    <img src="wirosableng.png" alt="Wiro Sableng">
                    <h2>WIRO SABLENG</h2>
                </div>
            </div>
            <div class="khodam-selection-button-overlay">
                <button class="khodam-option-button batalpilih-button"><span>❌</span><br> BATAL</button>
                <button class="khodam-option-button pilih-button"><span>✔️</span><br> PILIH</button>
            </div>
        </div>

        <!-- Cari Lawan Page -->
        <div class="cari-lawan">
            <h2>Mencari Lawan</h2>
            <h1>⌛</h1>
        </div>

        <!-- Gameplay -->
        <div class="gameplay">
            <div class="player combatant">
                <div class="status-card-player status-card">
                    <p class="label" id="nama-player">KAMU</p>
                    <h2 class="name" id="player-battle-name">WIRO SABLENG</h2>
                    <div class="hp-track">
                        <div class="hp-fill" id="player-hp-fill" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="card-player battle-card">
                    <video class="card-art opponent-art" autoplay muted loop>
                        <source src="wirosableng.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
            <div class="opponent combatant">
                <div class="status-card-opponent status-card">
                    <p class="label" id="nama-opponent">MUSUH</p>
                    <h2 class="name" id="opponent-battle-name">SI PITUNG</h2>
                    <div class="hp-track">
                        <div class="hp-fill enemy-fill" id="opponent-hp-fill" style="width: 100%;"></div>
                    </div>
                </div>
                <div class="card-opponent battle-card">
                    <img class="card-art opponent-art" src="sipitung.png" alt="Si Pitung">
                </div>
            </div>
        </div>
        <div class="surrender-overlay">
            <button class="surrender-button">🏳️</button>
        </div>
        <div class="action-menu-overlay">
            <button class="action-button">🗡️</button>
            <button class="action-button">⚔️</button>
            <button class="action-button">💥</button>
            <button class="action-button">🛡️</button>
        </div>

        <!-- Animasi Fullscreen -->
        <div class="fullscreen-animation-in-game">
            <video autoplay muted>
                <source src="wirosableng.mp4" type="video/mp4">
            </video>
        </div>

        <script src="script.js"></script>
    </body>
</html>
