<!DOCTYPE html>
<html>
<head>
  <title>Pokemon Orbit UI Final</title>
  <style>
    body {
      margin: 0;
      background: #0f172a;
      overflow: hidden;
    }

    canvas {
      display: block;
      margin: auto;
      background: radial-gradient(circle, #1e293b, #020617);
    }
  </style>
</head>
<body>

<canvas id="game" width="400" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let angle = Math.PI / 2;
let targetAngle = angle;
let isSwitching = false;

const centerX = canvas.width / 2;
const centerY = canvas.height / 2 + 40;
const radiusX = 120;
const radiusY = 60;

// offset perspektif (INI YANG KAMU MINTA)
const offsetX = 40;

canvas.addEventListener("click", () => {
  if (!isSwitching) {
    targetAngle += Math.PI;
    isSwitching = true;
  }
});

function drawUI(x, y, scale, name, hp) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // box UI
  ctx.fillStyle = "#020617cc";
  ctx.fillRect(-50, -110, 100, 40);

  // nama
  ctx.fillStyle = "white";
  ctx.font = "10px Arial";
  ctx.fillText(name, -45, -95);

  // HP bar (manual render biar mirip <progress>)
  ctx.fillStyle = "#1e293b";
  ctx.fillRect(-45, -85, 90, 8);

  ctx.fillStyle = "#22c55e";
  ctx.fillRect(-45, -85, 90 * hp, 8);

  ctx.restore();
}

function drawCard(x, y, scale, color) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  ctx.fillStyle = color;
  ctx.fillRect(-45, -65, 90, 130);

  ctx.restore();
}

function getScale(y) {
  const t = (y - (centerY - radiusY)) / (2 * radiusY);
  return 0.7 + t * 0.6;
}

function update() {
  requestAnimationFrame(update);
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // animasi rotasi
  if (isSwitching) {
    angle += (targetAngle - angle) * 0.08;
    if (Math.abs(targetAngle - angle) < 0.01) {
      angle = targetAngle;
      isSwitching = false;
    }
  }

  // posisi orbit + OFFSET kiri kanan
  const playerPos = {
    x: centerX + Math.cos(angle) * radiusX - offsetX,
    y: centerY + Math.sin(angle) * radiusY
  };

  const enemyPos = {
    x: centerX + Math.cos(angle + Math.PI) * radiusX + offsetX,
    y: centerY + Math.sin(angle + Math.PI) * radiusY
  };

  const objects = [
    { ...playerPos, color: "cyan", name: "PLAYER", hp: 0.8 },
    { ...enemyPos, color: "red", name: "ENEMY", hp: 0.6 }
  ];

  // depth sorting
  objects.sort((a, b) => a.y - b.y);

  objects.forEach(obj => {
    const scale = getScale(obj.y);

    // UI di atas card
    drawUI(obj.x, obj.y, scale, obj.name, obj.hp);

    // card
    drawCard(obj.x, obj.y, scale, obj.color);
  });
}

update();
</script>

</body>
</html>
